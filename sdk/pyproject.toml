[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rixl-sdk-python"
version = "0.0.0-kiota"
description = "Kiota-generated Python SDK for RIXL."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "microsoft-kiota-bundle==1.5.0",
]

[tool.setuptools]
py-modules = ["rixl_client"]

[tool.setuptools.packages.find]
where = ["."]
include = ["feeds*", "images*", "videos*", "models*"]
